# Family Tree login theme — matches family-tree-react look & feel.
# Extends the stock keycloak.v2 (PatternFly v5) login theme and layers our
# palette on top, so we keep all base layout/markup and only restyle.
parent=keycloak.v2
import=common/keycloak

# Keep v2's base stylesheet (resolved via the parent chain) and append ours.
styles=css/styles.css css/familytree.css
