# Exposes the ArgoCD UI/API over HTTP via Traefik. argocd-server runs in insecure
# mode (configs.params server.insecure=true), so the backend is plain HTTP on :80.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
spec:
  ingressClassName: traefik
  rules:
    - host: argocd.192.168.0.100.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
