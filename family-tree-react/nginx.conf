server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: history-API fallback so client-side routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the runtime config or the entrypoint
    location = /env.js {
        add_header Cache-Control "no-store";
    }
}
