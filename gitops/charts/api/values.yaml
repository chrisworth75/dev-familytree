registry: 192.168.0.100:5001
image:
  repository: family-tree-app
  tag: e15511e
  pullPolicy: Always   # skeleton uses the moving 'latest' tag; Phase 5 switches to SHA tags
host: api.familytree.192.168.0.100.nip.io
db:
  host: postgres
  port: "5432"
  name: familytree
  user: familytree
  secretName: postgres          # created by the postgres chart
  passwordKey: POSTGRES_PASSWORD
keycloak:
  jwkSetUri: http://keycloak:8080/realms/family-tree/protocol/openid-connect/certs
d3TreeServiceUrl: http://d3-tree-service:3300
uploads:
  storage: 1Gi          # PVC for /app/uploads (avatars) — persists across api pod restarts
seed:
  enabled: true
  image:
    repository: family-tree-seed
    tag: latest
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1Gi
