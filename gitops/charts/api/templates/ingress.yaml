apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  labels:
    app: api
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.host }}
      secretName: ft-tls
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3200
