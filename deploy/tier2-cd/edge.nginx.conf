# Tier 2 TLS edge — terminates HTTPS on the browser-facing ports and proxies to
# the (unchanged, http) react/api/keycloak services on the compose network.
# HTTPS is required so the SPA runs in a secure context (window.crypto.subtle),
# which keycloak-js needs for PKCE S256. Cert is mkcert-issued for 192.168.0.100
# and mounted from the host (kept out of git — it's a secret).

# react SPA
server {
    listen 24202 ssl;
    server_name _;
    ssl_certificate     /certs/ft.crt;
    ssl_certificate_key /certs/ft.key;
    location / {
        proxy_pass http://react:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# API
server {
    listen 23200 ssl;
    server_name _;
    ssl_certificate     /certs/ft.crt;
    ssl_certificate_key /certs/ft.key;
    location / {
        proxy_pass http://api:3200;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# Keycloak — forward proto/host so it mints https issuer + redirect URLs
# (paired with KC_PROXY_HEADERS=xforwarded on the keycloak service).
server {
    listen 28081 ssl;
    server_name _;
    ssl_certificate     /certs/ft.crt;
    ssl_certificate_key /certs/ft.key;
    location / {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 28081;
    }
}
