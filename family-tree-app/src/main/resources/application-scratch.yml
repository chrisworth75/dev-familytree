# Scratch/playground profile - connects to empty test database
# Usage: mvn spring-boot:run -Dspring-boot.run.profiles=scratch

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/familytree_test
    username: familytree
    password: familytree

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/family-tree

  flyway:
    # Allow clean for test database reset
    clean-disabled: false
