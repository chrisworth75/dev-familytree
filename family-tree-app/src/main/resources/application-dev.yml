# Development profile - connects to real data
# Usage: mvn spring-boot:run -Dspring-boot.run.profiles=dev

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/familytree
    username: familytree
    password: familytree

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/family-tree

  flyway:
    # SAFETY: Prevent accidental database wipes
    clean-disabled: true
